"$schema"    = "https://starship.rs/config-schema.json"
format       = """
[‚ĖĎ‚Ėí‚Ėď](#a3aed2)\
[$os$hostname](bg:#a3aed2 fg:#090c0c)\
[Óāī](bg:#769ff0 fg:#a3aed2)\
$directory\
[Óāī](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[Óāī](fg:#394260 bg:#212736)\
$package\
[Óāī](fg:#212736 bg:#1d2230)\
$time\
[Óāī](fg:#1d2230)\
$character\
"""
right_format = ""
add_newline  = false
scan_timeout = 30

[os]
format   = "[ $symbol](bg:#a3aed2 fg:#090c0c)"
disabled = false

[os.symbols]
Ubuntu = "ÔĆú"
Macos  = "ÔĆā"

[shell]
format         = "[$indicator](bg:#a3aed2 fg:#090c0c)"
bash_indicator = "ÓĮä"
zsh_indicator  = "Óěē"
fish_indicator = "ůįąļ"
disabled       = false

[directory]
style             = "fg:#e3e5e5 bg:#769ff0"
format            = "[ $path]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music"     = "ÔÄĀ "
"Pictures"  = "ÔÄĺ "

[git_branch]
symbol = "Ôźė"
style  = "bg:#394260"
format = "[[ $symbol $branch](fg:#769ff0 bg:#394260)]($style)"

[git_status]
style  = "bg:#394260"
format = "[[( $all_status$ahead_behind)](fg:#769ff0 bg:#394260)]($style)"

[python]
symbol = "ÓąĶ"
style  = "bg:#212736"
format = "[[ $symbol ($version)](fg:#769ff0 bg:#212736)]($style)"

# slow in fish shell
[custom.uv]
command      = "uv python find --show-version"
detect_files = ["uv.lock", "pyproject.toml"]
symbol       = "ÓąĶ"
style        = "bg:#212736"
format       = "[[ $symbol ($output)](fg:#769ff0 bg:#212736)]($style)"

[nodejs]
symbol = "Óúė"
style  = "bg:#212736"
format = "[[ $symbol ($version)](fg:#769ff0 bg:#212736)]($style)"

[rust]
symbol = "Óě®"
style  = "bg:#212736"
format = "[[ $symbol ($version)](fg:#769ff0 bg:#212736)]($style)"

[golang]
symbol = "Óėß"
style  = "bg:#212736"
format = "[[ $symbol ($version)](fg:#769ff0 bg:#212736)]($style)"

[package]
format = "[[ Óóĺ $version](bg:#212736 fg:#769ff0)]($style)"

[time]
disabled = false
style    = "bg:#1d2230"
format   = "[[ Ôźļ $time](fg:#a0a9cb bg:#1d2230)]($style)"
use_12hr = true

[hostname]
ssh_only = false
format   = "[ $ssh_symbol$hostname](bg:#a3aed2 fg:#090c0c)"

[claude_model]
symbol = "ůįö©"
style  = "fg:#d97757"
format = "[$symbol Model $model]($style)"

[claude_model.model_aliases]
"Claude Opus 4.7"   = "Opus 4.7"
"Claude Sonnet 4.6" = "Sonnet 4.6"
"Claude Haiku 4.5"  = "Haiku 4.5"

[claude_context]
symbol               = "ūüďĄ"
format               = "[$symbol $percentage $gauge]($style)"
gauge_width          = 10
gauge_full_symbol    = "‚Ė†"
gauge_partial_symbol = "‚Ė†"
gauge_empty_symbol   = "‚Ė°"

[[claude_context.display]]
threshold = 0
style     = "fg:#a3aed2"

[[claude_context.display]]
threshold = 60
style     = "fg:#e5c07b"

[[claude_context.display]]
threshold = 80
style     = "fg:#d97757"

[claude_cost]
symbol = "ūüíĶ"
format = "[$symbol \\$$cost]($style)"

[[claude_cost.display]]
threshold = 0
style     = "fg:#769ff0"

[[claude_cost.display]]
threshold = 5
style     = "fg:#e5c07b"

[[claude_cost.display]]
threshold = 20
style     = "fg:#d97757"

[profiles]
claude-code = """
$claude_model\
[  ](fg:#666666)\
$claude_context\
[  ](fg:#666666)\
$claude_cost\
"""
